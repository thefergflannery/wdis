<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Where Do I Stand? - Irish Political Compass</title>
<meta name="description" content="56 questions. 20 parties. Find out where you stand on the Irish political spectrum - including the April 2026 fuel crisis.">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={
  darkMode:'class',
  theme:{
    extend:{
      fontFamily:{sans:['-apple-system','BlinkMacSystemFont','"Segoe UI"','Inter','sans-serif']},
      fontSize:{
        '2xs':['10px',{lineHeight:'1.4'}],
        'xs':['11px',{lineHeight:'1.5'}],
        'sm':['13px',{lineHeight:'1.6'}],
        'base':['15px',{lineHeight:'1.65'}],
        'lg':['17px',{lineHeight:'1.5'}],
        'xl':['20px',{lineHeight:'1.3'}],
        '2xl':['24px',{lineHeight:'1.2'}],
        '3xl':['30px',{lineHeight:'1.1'}],
        '4xl':['38px',{lineHeight:'1.05'}],
        '5xl':['48px',{lineHeight:'1'}],
      }
    }
  }
}
</script>
<style>
/* Tap button states — class-swapped from JS */
.tap-btn{flex:1;padding:9px 4px;font-size:11px;border:1px solid #e2e8f0;background:#fff;color:#64748b;border-radius:10px;transition:all .12s;font-weight:500;line-height:1.3;text-align:center;cursor:pointer;font-family:inherit}
.tap-btn:hover{border-color:#94a3b8;color:#334155}
.tap-btn.neg{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}
.tap-btn.pos{background:#fffbeb;color:#b45309;border-color:#fde68a}
.tap-btn.neu{background:#f1f5f9;color:#0f172a;border-color:#94a3b8}
.dark .tap-btn{background:#1e293b;border-color:#334155;color:#94a3b8}
.dark .tap-btn:hover{border-color:#475569;color:#cbd5e1}
.dark .tap-btn.neg{background:#1e3a5f;color:#93c5fd;border-color:#1d4ed8}
.dark .tap-btn.pos{background:#451a03;color:#fcd34d;border-color:#92400e}
.dark .tap-btn.neu{background:#334155;color:#f1f5f9;border-color:#64748b}
@media(max-width:480px){.tap-btn{font-size:10px;padding:8px 2px}}
/* Ticker tag */
.tick-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;flex-shrink:0;letter-spacing:.06em;text-transform:uppercase}
.tick-live{background:#fee2e2;color:#991b1b}
.tick-pol{background:#dbeafe;color:#1e40af}
.tick-eco{background:#fef3c7;color:#92400e}
.dark .tick-live{background:#450a0a;color:#fca5a5}
.dark .tick-pol{background:#1e3a5f;color:#93c5fd}
.dark .tick-eco{background:#451a03;color:#fcd34d}
/* Ticker fade */
.tick-text{transition:opacity .3s}
/* Progress bar */
#pbar{transition:width .3s ease}
/* Sidebar scrollbar */
.sidebar-scroll::-webkit-scrollbar{width:3px}
.sidebar-scroll::-webkit-scrollbar-track{background:transparent}
.sidebar-scroll::-webkit-scrollbar-thumb{background:rgba(148,163,184,.35);border-radius:4px}
</style>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 antialiased" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif">
<div id="root" class="max-w-5xl mx-auto"></div>
<script defer src="/_vercel/insights/script.js"></script>
<script src="js/data.js"></script>
<script src="js/scoring.js"></script>
<script src="js/compass.js"></script>
<script src="js/render.js"></script>
<script src="js/app.js"></script>
</body>
</html>
