        '2xs':['10px',{lineHeight:'1.4',letterSpacing:'0.08em'}],

<style>
/* Tap button — class-swapped from JS */
.tap-btn{flex:1;padding:10px 4px;min-height:48px;font-size:11px;letter-spacing:.03em;border:1px solid #2d2d2d;background:#1c1c1c;color:#5a5a5a;border-radius:8px;transition:all .15s;font-weight:600;line-height:1.3;text-align:center;cursor:pointer;font-family:'Space Grotesk',sans-serif}
.tap-btn:hover{border-color:#5a5a5a;color:#949494}
.tap-btn.neg{background:#3cffd0;color:#000000;border-color:#3cffd0}
.tap-btn.pos{background:#5200ff;color:#ffffff;border-color:#5200ff}
.tap-btn.neu{background:#2d2d2d;color:#ffffff;border-color:#ffffff}
/* Light mode tap overrides */
html:not(.dark) .tap-btn{background:#f8fafc;border-color:#e2e8f0;color:#94a3b8}
html:not(.dark) .tap-btn:hover{border-color:#94a3b8;color:#475569}
html:not(.dark) .tap-btn.neg{background:#3cffd0;color:#000000;border-color:#3cffd0}
html:not(.dark) .tap-btn.pos{background:#5200ff;color:#ffffff;border-color:#5200ff}
html:not(.dark) .tap-btn.neu{background:#1e293b;color:#ffffff;border-color:#1e293b}
@media(max-width:480px){.tap-btn{font-size:10px;padding:10px 2px}}
/* Ticker */
.tick-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;flex-shrink:0;letter-spacing:.08em;text-transform:uppercase;font-family:'Space Mono',monospace}
.tick-live{background:#ff3c3c;color:#ffffff}
.tick-pol{background:#3cffd0;color:#000000}
.tick-eco{background:#f0a500;color:#000000}
.tick-text{transition:opacity .3s;font-family:'Space Grotesk',sans-serif}
/* Progress */
#pbar{transition:width .3s ease}
/* Sidebar scroll */
.sidebar-scroll{scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
.sidebar-scroll::-webkit-scrollbar{width:3px}
.sidebar-scroll::-webkit-scrollbar-track{background:transparent}
.sidebar-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:4px}
/* Explainer left-border */
.q-explain-block{border-left:2px solid #3cffd0;background:#1c1c1c}
html:not(.dark) .q-explain-block{border-left:2px solid #4f46e5;background:#f8fafc}
/* ── Responsive layout ───────────────────── */
.wrap{max-width:1440px;margin:0 auto;padding:0 32px}
.tick-bar{background:#1c1c1c;border-bottom:1px solid #2d2d2d;padding:7px 32px;display:flex;gap:12px;align-items:center;overflow:hidden}
.site-nav{display:flex;align-items:center;padding:14px 32px;border-bottom:1px solid #2d2d2d}
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;padding:80px 0 64px}
.news-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:64px}
.legend-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:40px}
.cat-tabs{display:flex;gap:8px;padding:20px 0 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:nowrap}
.cat-tabs::-webkit-scrollbar{display:none}
.quiz-layout{display:flex;gap:32px;align-items:flex-start;padding-bottom:64px}
.quiz-sidebar{width:300px;flex-shrink:0;position:sticky;top:84px;max-height:calc(100vh - 104px);overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.quiz-main{flex:1;min-width:0}
.results-grid{display:grid;grid-template-columns:3fr 2fr;gap:24px;margin-bottom:40px}
/* Tablet: 768–1023px */
@media(min-width:768px) and (max-width:1023px){
  .wrap{padding:0 24px}
  .tick-bar{padding:7px 24px}
  .site-nav{padding:12px 24px}
  .hero-grid{gap:32px;padding:60px 0 48px}
  .news-grid{grid-template-columns:repeat(2,1fr)}
  .quiz-layout{flex-direction:column}
  .quiz-sidebar{width:100%;position:static;max-height:none;top:auto;flex-direction:row;flex-wrap:wrap}
  .quiz-sidebar>div{flex:1;min-width:280px}
  .results-grid{grid-template-columns:1fr}
}
/* Mobile: <768px */
@media(max-width:767px){
  .wrap{padding:0 16px}
  .tick-bar{padding:6px 16px;gap:8px}
  .site-nav{padding:10px 16px}
  .hero-grid{grid-template-columns:1fr;gap:28px;padding:40px 0 40px}
  .hero-compass-col{display:none}
  .news-grid{grid-template-columns:1fr}
  .legend-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .quiz-layout{flex-direction:column;gap:24px}
  .quiz-sidebar{width:100%;position:static;max-height:none;top:auto}
  .results-grid{grid-template-columns:1fr}
  .hero-wordmark{font-size:clamp(64px,18vw,96px) !important}
}
</style>
